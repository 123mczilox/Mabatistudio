<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="roofAnatomyTitle" style="max-width:100%;height:auto;">
  <title id="roofAnatomyTitle">Roof anatomy diagram showing eaves, ridge, rise, run, and pitch</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <linearGradient id="roofGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b0000" />
      <stop offset="100%" stop-color="#cc0000" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="900" height="520" fill="#f8f9fa" />
  <g transform="translate(60,70)">
    <rect x="0" y="260" width="780" height="120" fill="#dee2e6" rx="8" />
    <line x1="0" y1="260" x2="780" y2="260" stroke="#343a40" stroke-width="3" />
    <line x1="180" y1="260" x2="360" y2="120" stroke="#333" stroke-width="8" stroke-linecap="round" />
    <line x1="360" y1="120" x2="540" y2="260" stroke="#333" stroke-width="8" stroke-linecap="round" />
    <path d="M 180 260 L 120 300 L 660 300 L 600 260" fill="none" stroke="#495057" stroke-width="4" />
    <polygon points="180,260 360,120 540,260" fill="url(#roofGradient)" opacity="0.85" />
    <path d="M 180 260 L 180 260" />
    <line x1="180" y1="260" x2="180" y2="300" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="540" y1="260" x2="540" y2="300" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="120" y1="300" x2="600" y2="300" stroke="#333" stroke-width="3" marker-end="url(#arrow)" />
    <text x="180" y="320" font-family="Arial, sans-serif" font-size="22" fill="#212529" text-anchor="middle">Eaves</text>
    <text x="370" y="95" font-family="Arial, sans-serif" font-size="22" fill="#212529" text-anchor="middle">Ridge</text>
    <line x1="420" y1="215" x2="550" y2="300" stroke="#007bff" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="360" y1="120" x2="360" y2="260" stroke="#007bff" stroke-width="3" marker-end="url(#arrow)" />
    <text x="430" y="225" font-family="Arial, sans-serif" font-size="18" fill="#007bff">Rise</text>
    <text x="360" y="295" font-family="Arial, sans-serif" font-size="18" fill="#007bff" text-anchor="middle">Run</text>
    <path d="M 415 193 A 60 60 0 0 1 360 120" fill="none" stroke="#28a745" stroke-width="3" />
    <text x="390" y="150" font-family="Arial, sans-serif" font-size="18" fill="#28a745" text-anchor="middle">Pitch</text>
    <line x1="280" y1="302" x2="520" y2="302" stroke="#6c757d" stroke-width="4" />
    <text x="400" y="340" font-family="Arial, sans-serif" font-size="20" fill="#212529" text-anchor="middle">Roof Plan Width</text>
  </g>
  <g transform="translate(60,400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="22" fill="#212529">Roof Anatomy</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" fill="#495057">Wall-to-wall width is the building base,</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="16" fill="#495057">with eaves extending the roof frame edge.</text>
  </g>
</svg>